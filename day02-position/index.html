<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta To Derivatives | Day 2 - Position as a Function</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>Delta To Derivatives</h1>

    <h2>Day 2 — Position as a Function</h2>

    <p>
        Before we can study velocity, we need a way to describe motion.
        Calculus represents an object's position as a function of time.
    </p>

</header>

<main>

    <section class="canvas-section">

        <canvas id="canvas" width="700" height="500"></canvas>

    </section>

    <section class="controls">

        <h3>Controls</h3>

        <label>

            Time

            <input
                type="range"
                id="time"
                min="0"
                max="10"
                step="0.1"
                value="0">

            <span id="timeValue">0.0 s</span>

        </label>

    </section>

    <section class="info">

        <h3>Live Calculations</h3>

        <div class="card">

            <h4>Time</h4>

            <p id="timeData"></p>

        </div>

        <div class="card">

            <h4>Position Function</h4>

            <p id="functionData"></p>

        </div>

        <div class="card">

            <h4>Current Position</h4>

            <p id="positionData"></p>

        </div>

        <div class="card explanation">

            <h3>What's Happening?</h3>

            <p id="explanation"></p>

        </div>

    </section>

</main>

<footer>

<p>

</p>

</footer>

<script src="script.js"></script>

</body>
</html>
