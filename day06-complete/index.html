<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta To Derivatives | Day 6 - Motion Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>Delta To Derivatives</h1>

    <h2>Day 6 — Motion Dashboard</h2>

    <p>
        Position, velocity, and acceleration are all connected.
        Move through time and watch how all three graphs change together.
    </p>

</header>

<main>

<section class="canvas-section">

    <canvas
        id="canvas"
        width="700"
        height="700">
    </canvas>

</section>

<section class="controls">

    <h3>Controls</h3>

    <label>

        Time

        <input
            type="range"
            id="time"
            min="0"
            max="10"
            value="0"
            step="0.1">

        <span id="timeValue">
            0.0 s
        </span>

    </label>

</section>

<section class="info">

    <h3>Live Calculations</h3>

    <div class="card">

        <h4>Time</h4>

        <p id="timeData"></p>

    </div>

    <div class="card">

        <h4>Position</h4>

        <p id="positionData"></p>

    </div>

    <div class="card">

        <h4>Velocity</h4>

        <p id="velocityData"></p>

    </div>

    <div class="card">

        <h4>Acceleration</h4>

        <p id="accelerationData"></p>

    </div>

    <div class="card">

        <h4>Calculus Connections</h4>

        <p id="relationshipData"></p>

    </div>

    <div class="card explanation">

        <h3>What's Happening?</h3>

        <p id="explanation"></p>

    </div>

</section>

</main>

<footer>
</footer>

<script src="script.js"></script>

</body>

</html>
